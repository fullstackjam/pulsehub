{{- if and .Values.rollout.canary.enabled .Values.rollout.canary.analysis.enabled }}
---
# Success Rate Analysis Template
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  labels:
    {{- include "pulsehub.commonLabels" . | nindent 4 }}
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 1m
      successCondition: result >= 0.95
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local
          query: |
            sum(rate(
              http_requests_total{
                service="{{`{{args.service-name}}`}}",
                status!~"5.."
              }[5m]
            )) /
            sum(rate(
              http_requests_total{
                service="{{`{{args.service-name}}`}}"
              }[5m]
            ))
---
# Latency Analysis Template
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: latency
  labels:
    {{- include "pulsehub.commonLabels" . | nindent 4 }}
spec:
  args:
    - name: service-name
  metrics:
    - name: latency-p95
      interval: 1m
      successCondition: result <= 500
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local
          query: |
            histogram_quantile(0.95,
              sum(rate(
                http_request_duration_seconds_bucket{
                  service="{{`{{args.service-name}}`}}"
                }[5m]
              )) by (le)
            ) * 1000
{{- end }}
