{{- if and .Values.rollout.canary.enabled .Values.rollout.canary.canaryService }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}-canary
  labels:
    {{- include "pulsehub.commonLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "pulsehub.selectorLabels" . | nindent 4 }}
{{- end }}
